<!-- @dsCard group="Colors" viewport="700x220" subtitle="Azul / Azul Escuro — brand ramp" name="Blue ramp" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--white);}
  .row{display:flex;height:220px;}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff;font-size:12px;}
  .sw.light{color:var(--ink);}
  .name{font-weight:600;}
  .hex{opacity:.75;font-size:11px;}
</style>
<div class="row">
  <div class="sw" style="background:var(--blue-900)"><span class="name">blue-900</span><br><span class="hex">azul escuro</span></div>
  <div class="sw" style="background:var(--blue-700)"><span class="name">blue-700</span><br><span class="hex">azul escuro</span></div>
  <div class="sw" style="background:var(--blue-500)"><span class="name">blue-500</span><br><span class="hex">azul</span></div>
  <div class="sw light" style="background:var(--blue-300)"><span class="name">blue-300</span><br><span class="hex">azul claro</span></div>
  <div class="sw light" style="background:var(--blue-100)"><span class="name">blue-100</span><br><span class="hex">azul pálido</span></div>
  <div class="sw light" style="background:var(--blue-050)"><span class="name">blue-050</span><br><span class="hex">wash</span></div>
</div>
