<!-- @dsCard group="Colors" viewport="700x160" subtitle="Ink, slate, borders, surfaces" name="Neutrals" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--white);}
  .row{display:flex;height:160px;}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-size:12px;border-right:1px solid var(--line);}
  .name{font-weight:600;}
</style>
<div class="row">
  <div class="sw" style="background:var(--white);color:var(--ink);">white<br><span style="opacity:.6">#FFFFFF</span></div>
  <div class="sw" style="background:var(--blue-050);color:var(--ink);">bg-sunken<br><span style="opacity:.6">blue-050</span></div>
  <div class="sw" style="background:var(--ink);color:#fff;">ink<br><span style="opacity:.6">body text</span></div>
  <div class="sw" style="background:var(--slate);color:#fff;">slate<br><span style="opacity:.6">muted text</span></div>
  <div class="sw" style="background:var(--white);color:var(--ink);border:2px solid var(--line);">line<br><span style="opacity:.6">border 12%</span></div>
</div>
