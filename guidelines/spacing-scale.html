<!-- @dsCard group="Spacing" viewport="700x200" subtitle="4px base scale, used for padding & gaps" name="Spacing scale" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;font-family:var(--font-body);background:var(--white);box-sizing:border-box;}
  .row{display:flex;align-items:flex-end;gap:14px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:11px;color:var(--slate);}
  .bar{width:24px;background:var(--blue-500);border-radius:4px 4px 0 0;}
</style>
<div class="row">
  <div class="col"><div class="bar" style="height:var(--space-1)"></div>4</div>
  <div class="col"><div class="bar" style="height:var(--space-2)"></div>8</div>
  <div class="col"><div class="bar" style="height:var(--space-3)"></div>12</div>
  <div class="col"><div class="bar" style="height:var(--space-4)"></div>16</div>
  <div class="col"><div class="bar" style="height:var(--space-5)"></div>20</div>
  <div class="col"><div class="bar" style="height:var(--space-6)"></div>24</div>
  <div class="col"><div class="bar" style="height:var(--space-7)"></div>32</div>
  <div class="col"><div class="bar" style="height:var(--space-8)"></div>40</div>
  <div class="col"><div class="bar" style="height:var(--space-9)"></div>56</div>
  <div class="col"><div class="bar" style="height:80px"></div>76</div>
</div>
