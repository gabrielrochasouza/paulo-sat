<!-- @dsCard group="Components" viewport="700x300" subtitle="Button — primary/secondary/ghost/outline, Tag" name="Buttons & Tags" -->
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:26px;font-family:var(--font-body);background:var(--white);box-sizing:border-box;}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
  .dark{background:var(--blue-900);padding:20px;border-radius:16px;}
  .btn{font-weight:700;border-radius:999px;display:inline-flex;align-items:center;gap:10px;text-decoration:none;border:none;cursor:pointer;font-family:var(--font-body);}
  .btn-primary{background:var(--color-accent);color:var(--color-accent-on);padding:15px 26px;font-size:15.5px;box-shadow:var(--shadow-cta);}
  .btn-secondary{background:var(--color-brand);color:#fff;padding:15px 26px;font-size:15.5px;}
  .btn-ghost{background:rgba(255,255,255,0.12);color:#fff;padding:15px 22px;font-size:15px;border:1px solid rgba(255,255,255,0.4);}
  .btn-outline{background:transparent;color:var(--color-brand-strong);padding:13px 24px;font-size:15px;border:1.5px solid var(--color-brand);}
  .tag{display:inline-flex;align-items:center;padding:8px 14px;border-radius:999px;font-weight:600;font-size:13.5px;}
  .tag-light{background:var(--color-surface-tint);border:1px solid var(--color-border);color:var(--color-brand-strong);}
  .tag-accent{background:var(--yellow-300);border:1px solid var(--yellow-500);color:var(--yellow-on);}
</style>
<div class="row">
  <a class="btn btn-primary" href="#">Chamar no WhatsApp</a>
  <a class="btn btn-secondary" href="#">Ver serviços</a>
  <a class="btn btn-outline" href="#">Saiba mais</a>
</div>
<div class="row dark">
  <a class="btn btn-ghost" href="#">Ver serviços</a>
  <span class="tag" style="background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);color:#fff;">Instalação</span>
</div>
<div class="row">
  <span class="tag tag-light">Mudança de endereço</span>
  <span class="tag tag-accent">Orçamento grátis</span>
</div>
